<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RECOVERED IMAGE</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    overflow: hidden;
    font-family: Consolas, monospace;
    color: #00ff88;
}

/* CRT */
.crt::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
    );
    opacity: .18;
    z-index: 100;
}

.crt::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
        circle,
        transparent 55%,
        rgba(0,0,0,.45) 100%
    );
    z-index: 101;
}

/* Layout */
#terminal {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

#statusText {
    position: absolute;
    top: 40px;
    font-size: 1rem;
    letter-spacing: 3px;
    color: cyan;
    text-shadow: 0 0 10px cyan;
}

#imageContainer {
    width: 85vw;
    height: 80vh;
    border: 2px solid cyan;
    background: black;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 25px rgba(0,255,255,.35);
}

/* IMAGE */
#recoveredImage {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    filter: brightness(.2) contrast(1.4) grayscale(.2);
    transition: 3s ease;
}

#recoveredImage.visible {
    opacity: 1;
    filter: brightness(1) contrast(1) grayscale(0);
}

/* SCAN BAR */
#scanBar {
    position: absolute;
    top: -20%;
    left: 0;
    width: 100%;
    height: 15%;
    background: linear-gradient(
        to bottom,
        rgba(0,255,255,0),
        rgba(0,255,255,.35),
        rgba(255,255,255,.12),
        rgba(0,255,255,0)
    );
    mix-blend-mode: screen;
    opacity: 0;
}

#scanBar.active {
    opacity: 1;
    animation: scanDown 6s linear forwards;
}

@keyframes scanDown {
    from { top: -20%; }
    to { top: 120%; }
}

/* NOISE */
#noise {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.12) 1px, transparent 1px);
    background-size: 4px 4px;
    opacity: .08;
    pointer-events: none;
}

#canvas {
    width: 100%;
    height: 100%;
    display: block;
}

/* GLITCH */
.glitchFlash {
    animation: glitchFlash .12s linear 6;
}

@keyframes glitchFlash {
    0% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    100% { transform: translateX(0); }
}

/* BACK BUTTON */
#backBtn {
    position: absolute;
    bottom: 40px;
    padding: 12px 18px;
    background: black;
    color: cyan;
    border: 2px solid cyan;
    cursor: pointer;
    font-family: Consolas, monospace;
    letter-spacing: 2px;
    transition: 0.2s;
    z-index: 200;
}

#backBtn:hover {
    background: cyan;
    color: black;
}

/* LOCK STATE */
.locked #imageContainer {
    display: none;
}
</style>
</head>

<body class="crt">

<div id="terminal">

    <div id="statusText">RECOVERING IMAGE DATA...</div>

    <div id="imageContainer">
        <canvas id="canvas"></canvas>
        <div id="scanBar"></div>
        <div id="noise"></div>
    </div>

    <button id="backBtn">RETURN TO SIMULATION</button>

</div>

<script>

const result = localStorage.getItem("phase3Result");

const container = document.getElementById("imageContainer");
const scanBar = document.getElementById("scanBar");
const statusText = document.getElementById("statusText");
const backBtn = document.getElementById("backBtn");
const canvas = document.getElementById("canvas");

backBtn.addEventListener("click", () => {
    window.location.href = "phase3.html"; // back to simulator
});

/* IF NO RESULT */
if (!result) {
    statusText.innerHTML = "NO DATA FOUND // RETURNING TO SIMULATION";

    setTimeout(() => {
        window.location.href = "phase3.html";
    }, 2000);
}

/* IMAGE ROUTING */
const imageSrc = result === "correct" ? "image1.jpg" : "image2.jpg";
const isCorrupt = result !== "correct";

/* PIXEL RENDER ENGINE */
function runPixelReconstruction() {

    const ctx = canvas.getContext("2d");

    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;

    const img = new Image();
    img.src = imageSrc;

    img.onload = () => {

        const w = canvas.width;
        const h = canvas.height;

        const buffer = document.createElement("canvas");
        const bctx = buffer.getContext("2d");

        buffer.width = w;
        buffer.height = h;

        bctx.drawImage(img, 0, 0, w, h);

        const data = bctx.getImageData(0, 0, w, h).data;

        let i = 0;

        function render() {

            const speed = isCorrupt ? 15000 : 6000;

            for (let j = 0; j < speed; j++) {

                if (i >= data.length) break;

                const x = (i / 4) % w;
                const y = Math.floor((i / 4) / w);

                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];
                let a = data[i + 3];

                if (isCorrupt && Math.random() < 0.3) {
                    r = 255;
                    g = 0;
                    b = 0;
                }

                ctx.fillStyle = `rgba(${r},${g},${b},${a / 255})`;
                ctx.fillRect(x, y, 1, 1);

                i += 4;
            }

            if (i < data.length) {
                requestAnimationFrame(render);
            } else {
                statusText.innerHTML = isCorrupt
                    ? "IMAGE CORRUPTION DETECTED"
                    : "IMAGE RECONSTRUCTION COMPLETE";
            }
        }

        /* SCAN EFFECT */
        setTimeout(() => {
            scanBar.classList.add("active");
            container.classList.add("glitchFlash");
        }, 600);

        render();

        setTimeout(() => {
            scanBar.style.opacity = "0";
        }, 6500);
    };
}

runPixelReconstruction();

</script>
/* CONTROL FLOW */
if (!solved) {
    lockScreen();
} else {
    runReconstruction();
}
</script>

</body>
</html>
